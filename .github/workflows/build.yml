name: 1. Build & Push Multi-Images

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: mtproto-proxy-499913            # 👈 Replace
  GAR_LOCATION: us-central1                 # 👈 Replace
  REPOSITORY: stock                # 👈 Replace

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      run: |
        gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

    - name: Build and Push Frontend & Backend
      run: |
        TAG="${{ github.sha }}"
        REGISTRY_URL="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}"
        
        # Build and Push Backend
        docker build -t $REGISTRY_URL/stock-backend:$TAG ./backend
        docker push $REGISTRY_URL/stock-backend:$TAG
        
        # Build and Push Frontend
        docker build -t $REGISTRY_URL/stock-frontend:$TAG ./frontend
        docker push $REGISTRY_URL/stock-frontend:$TAG