name: 2. Deploy Multi-Container App

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Git Commit SHA (Image Tag) to deploy'
        required: true
        type: string

env:
  PROJECT_ID: mtproto-proxy-499913            # 👈 Replace
  GAR_LOCATION: us-central1                 # 👈 Replace
  REPOSITORY: stock                # 👈 Replace
  VM_NAME: stock-app                        # 👈 Replace with your Linux VM Name
  VM_ZONE: us-central1-f                    # 👈 Replace

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code (To get the docker-compose template)
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Prepare and Execute Remote Deployment
      run: |
        TAG="${{ github.event.inputs.commit_sha }}"
        REGISTRY_URL="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}"
        
        # 1. Dynamically update the docker-compose file local to the runner to point to the production registry images
        # This overwrites the local "build:" blocks with the production image paths
        sed -i "s|build:.*context: ./backend.*dockerfile: Dockerfile|image: $REGISTRY_URL/stock-backend:$TAG|g" docker-compose.yml
        sed -i "s|build:.*context: ./frontend.*dockerfile: Dockerfile|image: $REGISTRY_URL/stock-frontend:$TAG|g" docker-compose.yml
        
        # 2. Securely copy the modified docker-compose file to the VM
        gcloud compute scp docker-compose.yml ${{ env.VM_NAME }}:~/docker-compose.yml --zone=${{ env.VM_ZONE }} --quiet
        
        # 3. Connect to the VM via SSH, authenticate Docker, pull the new images, and cycle the containers
        gcloud compute ssh ${{ env.VM_NAME }} --zone=${{ env.VM_ZONE }} --quiet --command="
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet
          docker compose pull
          docker compose up -d --remove-orphans
        "