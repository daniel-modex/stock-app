name: 2. Deploy Multi-Container App

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Git Commit SHA (Image Tag) to deploy'
        required: true
        type: string

env:
  PROJECT_ID: mtproto-proxy-499913            # 👈 Replace
  GAR_LOCATION: us-central1                 # 👈 Replace
  REPOSITORY: stock                # 👈 Replace
  VM_NAME: stock-app                        # 👈 Replace with your Linux VM Name
  VM_ZONE: us-central1-f                    # 👈 Replace

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code (To get the docker-compose template)
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Prepare and Execute Remote Deployment
      run: |
        TAG="${{ github.event.inputs.commit_sha }}"
        REGISTRY_URL="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}"
        
        # Connect via SSH, authenticate using a token, pull the individual images, and run them manually
        gcloud compute ssh ${{ env.VM_NAME }} --zone=${{ env.VM_ZONE }} --quiet --command="
          # 1. Authenticate Docker with Artifact Registry
          echo '$(gcloud auth print-access-token)' | docker login -u oauth2access_token --password-stdin https://${{ env.GAR_LOCATION }}-docker.pkg.dev
          
          # 2. Pull the specific updated images
          docker pull $REGISTRY_URL/stock-backend:$TAG
          docker pull $REGISTRY_URL/stock-frontend:$TAG
          
          # 3. Stop and remove the old containers if they are running
          docker stop stock-backend stock-frontend || true
          docker rm stock-backend stock-frontend || true
          
          # 4. Run the backend (Make sure your network/database setup matches)
          docker run -d --name stock-backend \
            --restart always \
            -p 8000:8000 \
            -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            $REGISTRY_URL/stock-backend:$TAG
            
          # 5. Run the frontend
          docker run -d --name stock-frontend \
            --restart always \
            -p 8080:80 \
            $REGISTRY_URL/stock-frontend:$TAG
        "